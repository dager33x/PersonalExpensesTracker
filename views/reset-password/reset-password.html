<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="ledger-card">
        <div class="stamp" aria-hidden="true">
          <span>NEW&nbsp;PASSWORD</span>
        </div>

        <p class="eyebrow">Password reset</p>
        <h1>Choose a new password.</h1>
        <p class="lede">Set a fresh password to regain access to your account.</p>

        <div class="rule"></div>

        <form id="reset-form" class="form" novalidate>
          <div class="row">
            <label for="password">New password</label>
            <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required />
          </div>

          <div class="row">
            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" type="password" placeholder="Re-enter your password" autocomplete="new-password" minlength="8" required />
          </div>

          <p id="message" class="message" aria-live="polite"></p>
          <p id="error" class="error" aria-live="polite"></p>

          <button id="submit-btn" type="submit">Update password</button>
        </form>

        <div class="rule"></div>

        <p class="footnote">Back to <a href="/login">sign in</a></p>
      </section>
    </main>

    <script src="/reset-password/reset-password.js"></script>
  </body>
</html>
