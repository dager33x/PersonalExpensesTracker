<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="ledger-card">
        <div class="stamp" aria-hidden="true">
          <span>RESET&nbsp;LINK</span>
        </div>

        <p class="eyebrow">Password recovery</p>
        <h1>Get a reset link.</h1>
        <p class="lede">Enter your email and we'll send a secure password reset link.</p>

        <div class="rule"></div>

        <form id="forgot-form" class="form" novalidate>
          <div class="row">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <p id="message" class="message" aria-live="polite"></p>
          <p id="error" class="error" aria-live="polite"></p>

          <button id="submit-btn" type="submit">Send reset link</button>
        </form>

        <div class="rule"></div>

        <p class="footnote">Remembered it? <a href="/login">Back to sign in</a></p>
      </section>
    </main>

    <script src="/forgot-password/forgot-password.js"></script>
  </body>
</html>
