<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker | Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/signup/sign-up.css" />
  </head>
  <body>
    <main class="page">
      <section class="ledger-card">
        <div class="stamp" aria-hidden="true">
          <span>NEW&nbsp;ACCOUNT</span>
        </div>

        <p class="eyebrow">Account setup</p>
        <h1>Open your ledger.</h1>
        <p class="lede">Create an account to start tracking spending.</p>

        <div class="rule"></div>

        <form id="signup-form" class="form" novalidate>
          <div class="row">
            <label for="name">Full name</label>
            <input id="name" type="text" placeholder="Jane Doe" autocomplete="name" required />
          </div>

          <div class="row">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="row">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" minlength="8" required />
          </div>

          <div class="row">
            <label for="confirm-password">Confirm password</label>
            <input id="confirm-password" type="password" placeholder="Re-enter your password" autocomplete="new-password" minlength="8" required />
          </div>

          <p id="message" class="message" aria-live="polite"></p>
          <p id="error" class="error" aria-live="polite"></p>

          <button id="submit-btn" type="submit">Create Account</button>
        </form>

        <div class="rule"></div>

        <p class="footnote">Already have an account? <a href="/login">Sign in</a></p>
      </section>
    </main>

    <script src="/signup/sign-up.js"></script>
  </body>
</html>
