<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page">
      <section class="ledger-card">
        <div class="stamp" aria-hidden="true">
          <span>VERIFIED&nbsp;ACCESS</span>
        </div>

        <p class="eyebrow">Account access</p>
        <h1>Welcome back.</h1>
        <p class="lede">Sign in to keep your ledger current.</p>

        <div class="rule"></div>

        <form id="login-form" class="form" novalidate>
          <div class="row">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="row">
            <div class="row-head">
              <label for="password">Password</label>
              <a href="/forgot-password" class="text-link">Forgot?</a>
            </div>
            <div class="password-field">
              <input id="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
              <button type="button" class="password-toggle" data-target="password" aria-label="Show password" aria-pressed="false">👁️</button>
            </div>
          </div>

          <p id="message" class="message" aria-live="polite"></p>
          <p id="error" class="error" aria-live="polite"></p>

          <button id="submit-btn" type="submit">Sign In</button>
        </form>

        <div class="rule"></div>

        <p class="footnote">No account yet? <a href="/signup">Create one</a></p>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
